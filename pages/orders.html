<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Page || FoodieCart</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
  <link rel="shortcut icon" href="../imgs/aulogo.png" type="image/x-icon">
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/order-page.css"/>
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar sidebar-hidden" id="sidebar">
    <img src="../imgs/aulogo.png" alt="AU LOGO">
    <nav>
    <div class="search-box" id="search-mobile" >
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" class="food-search" placeholder="Search food...">
    </div>
      <a href="./homepage.html">
          <i class="fas fa-home"></i>
          <span>Home</span>
      </a>
      <a href="./orders.html">
          <i class="fas fa-box"></i>
          <span>Orders</span>
      </a>
      <a href="">
          <i class="fa-regular fa-user"></i>    
          <span>Profile</span>
      </a>
      <a href="../index.html">
          <i class="fas fa-sign-out-alt"></i>  
          <span>Logout</span>
      </a>
    </nav>
  </aside>

  <!-- Overlay -->
  <div id="overlay" class="overlay"></div>

  <!-- Main Content -->
  <main class="main">

    <section class="menu-section" style="width: 100%; ">

      <!-- Top Navigation -->
      <div class="top-nav" >

        <div class="nav-left" >
          <div class="title-mobile">
              <button id="menu-btn" class="menu-btn">
                <i class="fa-solid fa-bars"></i>
              </button>
              <h4>AU Canteen System</h4>
          </div>
         
        </div>

        <div class="search-box" id="search-desktop">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text"  class="food-search" placeholder="Search food...">
        </div>
      </div>

      <div class="content">
        <div class="orders-grid">
          <!-- New Orders -->
          <div class="order-column new">
            <h3>New Orders</h3>
            <div id="new-orders" class="order-list"></div>
          </div>
          <!-- Preparing -->
          <div class="order-column preparing">
            <h3>Preparing</h3>
            <div id="preparing-orders" class="order-list"></div>
          </div>
          <!-- Ready -->
          <div class="order-column ready">
            <h3>Ready</h3>
            <div id="ready-orders" class="order-list"></div>
          </div>

        </div>
      
      </div>
    </section>
  </main>
</div>
<script type="module" src="../script/main.js"></script>
<script type="module" src="../script/modules/utils/script.js"></script>
<script type="module" src="../script/modules/cart/orders.js"></script>
</body>
</html>
