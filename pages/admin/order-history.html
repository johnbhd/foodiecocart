<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Page || FoodieCart</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
  <link rel="shortcut icon" href="../../imgs/aufoodieco-logo.ico" type="image/x-icon">
  <link rel="stylesheet" href="../../css/style.css"/>
  <link rel="stylesheet" href="../../css/admin/managements.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<!-- Sidebar -->
  <aside class="sidebar sidebar-hidden" id="sidebar">
    <img src="../../imgs/aulogo.png" alt="AU LOGO">
    <h2>Admin</h2>
    <nav>
      <a href="./dashboard.html">
          <i class="fas fa-home"></i>
          <span>Home</span>
      </a>
      <a href="./order-management.html">
          <i class="fas fa-box"></i>
          <span>Orders</span>
      </a>
      <a href="./user-management.html">
          <i class="fa-regular fa-user"></i>    
          <span>Users</span>
      </a>
      <a href="./menu-management.html">
          <i class="fas fa-list"></i>
          <span>Menu</span>
      </a>
    
      <a href="./order-history.html">
          <i class="fas fa-receipt"></i>
          <span>Records</span>
      </a>

      <button id="logout-btn">
          <i class="fas fa-sign-out-alt"></i>  
          <span>Logout</span>
      </button>
    </nav>
  </aside>

  <!-- Overlay -->
  <div id="overlay" class="overlay"></div>

  <!-- Main Content -->
  <main class="main">
    <section class="menu-section" style="width: 100%;">
      <!-- Top Navigation -->
      <div class="top-nav">
        <div class="nav-left">
          <div class="title-mobile">
              <button id="menu-btn" class="menu-btn">
                <i class="fa-solid fa-bars"></i>
              </button>
              <h4>AU Canteen System</h4>
          </div>
        </div>
      </div>
      <!-- Main -->
      <div class="content">
        <div class="wrapper">
            <!-- 
            <div class="notification success">
                <div class="notification-body">
                    <div class="noti-head">
                        <i class="fa-solid fa-check icon successful"></i>
                        <h4>Success</h4>
                    </div>
                    <div class="noti-body">
                        <p>Your ticket was successfully created!</p>
                    </div>
                </div>
            </div>Notification Example -->

            <!-- Ticket Form -->
            <form>
                <h4>Orders History Management</h4>
                <div class="head-con">
                    <div class="searchdiv">
                        <input type="text" name="txtsearch" placeholder="Search ticket...">
                        <button type="submit" class="search-btn">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                    </div>
                </div>
                <div class="table-div">
                  <table id="order-history">
                    <thead>
                      <tr>
                        <th>Order ID</th>
                        <th>Food</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th>Date</th>
                      </tr>
                    </thead>
                
                    <tbody id="order-body">
                
                      <tr>
                        <td>ORD-001</td>
                        <td>Giniling with Rice</td>
                        <td>Meal</td>
                        <td>₱70</td>
                        <td>2</td>
                        <td>₱140</td>
                        <td>2026-03-14</td>
                      </tr>
                
                      <tr>
                        <td>ORD-002</td>
                        <td>Sisig with Rice</td>
                        <td>Meal</td>
                        <td>₱90</td>
                        <td>1</td>
                        <td>₱90</td>
                        <td>2026-03-14</td>
                      </tr>
                
                      <tr>
                        <td>ORD-003</td>
                        <td>Royal</td>
                        <td>Drink</td>
                        <td>₱18</td>
                        <td>3</td>
                        <td>₱54</td>
                        <td>2026-03-14</td>
                      </tr>
                
                    </tbody>
                
                    <tfoot>
                      <tr class="countTotal">
                        <td colspan="5">Total Sales</td>
                        <td colspan="2">₱284</td>
                      </tr>
                    </tfoot>
                  </table>
                </div>
            </form>
        </div>
        <!-- Footer -->
        <footer>
            
        </footer>
        </div>

    </section>
  </main>

</div>
<script type="module" src="../../script/modules/utils/script.js"></script>
</body>

</html>
