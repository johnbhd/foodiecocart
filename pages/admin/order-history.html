<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order History - Admin || FoodieCart</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
  <link rel="shortcut icon" href="../../imgs/aufoodieco-logo.ico" type="image/x-icon">
  <link rel="stylesheet" href="../../css/style.css"/>
  <link rel="stylesheet" href="../../css/admin/managements.css"/>
  <link rel="stylesheet" href="../../css/admin/modal.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<!-- Sidebar -->
  <aside class="sidebar sidebar-hidden" id="sidebar">
    <img src="../../imgs/aulogo.png" alt="AU LOGO">
    <h2>Admin</h2>
    <nav>
      <a href="./dashboard.html">
          <i class="fas fa-home"></i>
          <span>Home</span>
      </a>
      <a href="./order-management.html">
          <i class="fas fa-box"></i>
          <span>Orders</span>
      </a>
      <a href="./user-management.html">
          <i class="fa-regular fa-user"></i>    
          <span>Users</span>
      </a>
      <a href="./menu-management.html">
          <i class="fas fa-list"></i>
          <span>Menu</span>
      </a>
    
      <a href="./order-history.html">
          <i class="fas fa-receipt"></i>
          <span>Records</span>
      </a>

      <button id="logout-btn">
          <i class="fas fa-sign-out-alt"></i>  
          <span>Logout</span>
      </button>
    </nav>
  </aside>

  <!-- Overlay -->
  <div id="overlay" class="overlay"></div>
  
  <div class="popup-overlay" id="popup-details"></div>
  
  <div id="toast-container" ></div>
  <!-- Main Content -->
  <main class="main">
    <section class="menu-section" style="width: 100%;">
      <!-- Top Navigation -->
      <div class="top-nav">
        <div class="nav-left">
          <div class="title-mobile">
              <button id="menu-btn" class="menu-btn">
                <i class="fa-solid fa-bars"></i>
              </button>
              <h4>AU Canteen System</h4>
          </div>
        </div>
      </div>
      <!-- Main -->
      <div class="content">
        <div class="wrapper">
              <div class= "wrap-con">
                <h4>Orders History Management</h4>
                <div class="head-con">
                    <div class="searchdiv">
                        <input type="text" id="txtsearch" placeholder="Search orders...">
                        <button type="submit" class="search-btn">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                    </div>
                </div>
                <div class="table-div">
                  <table id="order-history">
                    <div id="loader" class="content-loader">
                        <div class="spinner"></div>
                    </div>
                  </table>
                </div>
            </div>
        </div>
        <!-- Footer -->
        <footer>
            
        </footer>
        </div>

    </section>
  </main>

</div>
<script type="module" src="../../script/modules/utils/script.js"></script>
<script type="module" src="../../script/admin/orderHistory/orderHistory.js"></script>

<script type="module" src="../../script/modules/utils/middleware.js"></script>
</body>

</html>
