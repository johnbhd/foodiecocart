<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Page || FoodieCart</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
  <link rel="shortcut icon" href="../imgs/aufoodieco-logo.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/homepage.css"/>
  <link rel="stylesheet" href="../css/food.css"/>
  <link rel="stylesheet" href="../css/modal.css"/>
  <link rel="stylesheet" href="../css/cart.css"/>
  <link rel="stylesheet" href="../css/foodieRoi.css"/>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar sidebar-hidden" id="sidebar">
    <img src="../imgs/aulogo.png" alt="AU LOGO">
    <nav>
      <div class="search-box" id="search-mobile" >
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" class="food-search" placeholder="Search food...">
      </div>
      <a href="./homepage.html">
          <i class="fas fa-home"></i>
          <span>Home</span>
      </a>
      <a href="./orders.html">
          <i class="fas fa-box"></i>
          <span>Orders</span>
      </a>
      <a href="./wallet.html">
          <i class="fa-solid fa-credit-card"></i>
          <span>Wallet</span>
      </a>
      <a href="./profile.html">
          <i class="fa-regular fa-user"></i>    
          <span>Profile</span>
      </a>
      <button id="logout-btn">
          <i class="fas fa-sign-out-alt"></i>  
          <span>Logout</span>
      </button>
    
    </nav>
  </aside>

  <!-- Overlay -->
  <div id="overlay" class="overlay"></div>
  <!-- Chat Modal -->
  <div class="chat-modal" id="chat-modal">
    <div class="chat-modal-header">
      <div class="chat-title">
        <img src="../imgs/foodieRoi.png" alt="">
        <span>FoodieRoi</span>
      </div>
      <button id="close-chat">&times;</button>
    </div>
    <div class="chat-modal-body" id="chat-body">
      <p class="chat-msg ai">Hi there! How can I help you today?</p>
    </div>
    <div class="chat-modal-footer">
      <input type="text" id="chat-input" placeholder="Type a message...">
      <button id="send-chat">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
  </div>
  <!-- Toast -->
  <div id="toast" class="toast">
    <div id="toast-box" class="toast-box">

      <div class="toast-icon">
        <i class="fa-solid fa-check"></i>
      </div>
      <span id="toast-message" class="toast-message"></span>
    </div>
  </div>
  <div id="toast-container" ></div>
  <!-- Modal  -->
  <div class="modal-con"></div>
  
  <!-- Main Content -->
  <main class="main">

    <section class="menu-section">

      <!-- Top Navigation -->
      <div class="top-nav">

        <div class="nav-left">
          <div class="title-mobile">
              <button id="menu-btn" class="menu-btn">
                <i class="fa-solid fa-bars"></i>
              </button>
              <h4>AU Canteen System</h4>
          </div>
          <div class="cart-div" id="cart-div">
            <i class="fa fa-shopping-cart cart-icon"></i>
          </div>
        </div>

        <div class="search-box" id="search-desktop">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text"  class="food-search" placeholder="Search food...">
        </div>
      </div>

      <div class="content">
            <!-- FoodieRoi.ai -->
        <div class="chatAssistant-icon">
          <div class="chatAssistant-floater">
            <img src="../imgs/foodieRoi.png" alt="">
            <p>Ask FoodieRoi</p>
          </div>
        </div>
        <div id="loader" class="content-loader">
          <div class="spinner"></div>
        </div>
        <!-- Categories -->
        <div class="categories">
          <div class="category-btn" data-category="Meal">
            <i class="fa-solid fa-plate-wheat"></i>
            <h4>Meals</h4>
          </div>

          <div class="category-btn" data-category="Snack">
            <i class="fa-solid fa-cookie-bite"></i>
            <h4>Snacks</h4>
          </div>

          <div class="category-btn" data-category="Drink">
            <i class="fa-solid fa-glass-water"></i>
            <h4>Drinks</h4>
          </div>
          <h4 id="textCon" style="color: red;"></h4>
        </div>

        <!-- Food Grid -->
        <div class="food-list" id="food-list"></div>

      </div>
    </section>

    <!-- Order Section -->
    <aside class="order-section">
      <h4>Order</h4>
      <div class="order-cart" id="order-cart"></div>
      

    </aside>

  </main>

</div>

<script type="module" src="../script/main.js"></script>
<script type="module" src="../script/modules/utils/script.js"></script>
<script type="module" src="../script/modules/ai/chatModal.js"></script>
<script type="module" src="../script/modules/utils/test.js"></script>
</body>
</html>
