<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./css/auth.css">
</head>
<body>
    <header>
        <nav class="nav">
            <div class="con-nav">
                <div class="nav-title">
                    <img src="./imgs/aulogo.png" alt="AU Logo">
                    <h4>AUFoodieCo</h4>
                </div>

                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Features</a></li>
                    <li><a href="#">Developers</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <section>
            <div class="con-main">
                <div class="hero-title">
                    <h2>AUFoodieCo: <span class="hero-span">Self-Service Canteen Ordering System </span></h2>
                    <p>
                       A web-based kiosk system that makes canteen ordering faster and easier for students and staff                    </p>
                    <div class="hero-btn">
                       <button class="btn-about">About the System</button>
                        <button class="btn-features">System Features</button>
                    </div>
                </div>
                <div class="wrapper">
                    <div class="authForm">
                        <img src="./imgs/aulogo.png" alt="Logo">
                        <h4 id="form-title">Login Page</h4>
                        <div class="form-fields">
                            <label>Email:</label>
                            <input type="text" id="txtEmail" required >

                            <label style="padding-top: 10px;">Password:</label>
                            <div class="passwordField">
                                <input type="password" id="txtPassword" required>
                                <i class="fa-solid fa-eye icon" id="passwordToggle"></i>
                            </div>
                            <button type="submit" class="btn" id="btn-login">Login</button>
                            
                        </div>
                    </div>
                    <button class="btn-auth" id="auth-btn">Dont have account? <u>Register here.</u> </button>
                </div>
            </div>
        </section>

    </main>
    <footer>
        <p>&copy; <span id="year">2026 </span> AUFoodieCo</p>
    </footer>
<script type="module" src="./script/modules/auth/auth.js"></script>
</body>
</html>
